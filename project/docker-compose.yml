version: '3.9'

services:
  mongodb:
    image: mongo:7
    container_name: primetrade_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
      MONGO_INITDB_DATABASE: primetrade
    volumes:
      - mongo_data:/data/db
    ports:
      - '27017:27017'
    networks:
      - primetrade_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: primetrade_backend
    restart: unless-stopped
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGODB_URI: mongodb://root:rootpassword@mongodb:27017/primetrade?authSource=admin
      JWT_SECRET: change_this_to_a_long_random_secret_min_32_chars
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_SECRET: change_this_refresh_secret_also_min_32_chars
      JWT_REFRESH_EXPIRES_IN: 30d
      ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - '5000:5000'
    depends_on:
      - mongodb
    networks:
      - primetrade_net
    volumes:
      - ./backend/logs:/app/logs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: primetrade_frontend
    restart: unless-stopped
    ports:
      - '3000:80'
    depends_on:
      - backend
    networks:
      - primetrade_net

networks:
  primetrade_net:
    driver: bridge

volumes:
  mongo_data:
